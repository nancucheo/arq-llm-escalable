version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  gateway:
    build: ./gateway-go
    ports:
      - "8080:8080"
    environment:
      - REDIS_ADDR=redis:6379
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: ./worker-python
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      replicas: 2

  frontend:
    build: ./frontend
    depends_on:
      - gateway

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway
      - frontend

  cache-cleaner:
    build: ./cron-jobs
    command: sh -c 'while true; do ./cache-cleaner; sleep 1800; done'
    environment:
      - REDIS_ADDR=redis:6379
      - STALE_TTL_HOURS=2
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  usage-reporter:
    build: ./cron-jobs
    command: sh -c 'while true; do ./usage-reporter; sleep 300; done'
    environment:
      - REDIS_ADDR=redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
