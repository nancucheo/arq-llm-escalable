apiVersion: batch/v1
kind: CronJob
metadata:
  name: usage-reporter
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      activeDeadlineSeconds: 60
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: usage-reporter
              image: <ACR_NAME>.azurecr.io/cronjobs:latest
              command: ["./usage-reporter"]
              env:
                - name: REDIS_ADDR
                  value: "redis:6379"
              resources:
                requests:
                  cpu: "50m"
                  memory: "64Mi"
                limits:
                  cpu: "200m"
                  memory: "128Mi"
