apiVersion: batch/v1
kind: CronJob
metadata:
  name: cache-cleaner
spec:
  schedule: "*/30 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      activeDeadlineSeconds: 60
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: cache-cleaner
              image: <ACR_NAME>.azurecr.io/cronjobs:latest
              command: ["./cache-cleaner"]
              env:
                - name: REDIS_ADDR
                  value: "redis:6379"
                - name: STALE_TTL_HOURS
                  value: "2"
              resources:
                requests:
                  cpu: "50m"
                  memory: "64Mi"
                limits:
                  cpu: "200m"
                  memory: "128Mi"
